name: Build DeepLog

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/deeplog.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deeplog
          path: app/build/outputs/apk/debug/deeplog.apk
          retention-days: 30
